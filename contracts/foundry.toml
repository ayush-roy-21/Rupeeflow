[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 10000
evm_version = "cancun"
via_ir = true

[profile.default.fuzz]
runs = 1000
max_test_rejects = 500000

[profile.default.invariant]
runs = 256
depth = 128

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 512, depth = 256 }
