<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RupeeFlow | Decentralized Sovereign Remittance on Base L2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>
    <div class="bg-glow bg-glow-4"></div>

    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="nav-brand">
            <div class="logo-icon" title="RupeeFlow Sovereign Logo"></div>
            <span class="brand-text">Rupee<span class="gradient-text">Flow</span></span>
            <span class="badge badge-network">Base L2 (Cancun)</span>
        </div>
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="remittance"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-banknote" style="vertical-align: -3px; margin-right: 6px;"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>Remittance</button>
            <button class="nav-tab" data-tab="tracking"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-server" style="vertical-align: -3px; margin-right: 6px;"><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></svg>Live Tracker <span class="tab-badge" id="active-tx-count">0</span></button>
            <button class="nav-tab" data-tab="admin"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-check" style="vertical-align: -3px; margin-right: 6px;"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>Compliance Admin</button>
        </nav>
        <div id="wallet-bar-container"></div>
    </header>

    <!-- Main Content Area -->
    <main class="main-container">
        <!-- Toast Notification Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Remittance Form Tab -->
        <section id="tab-remittance" class="tab-content active">
            <div id="remittance-form-container"></div>
        </section>

        <!-- Live Tracker Tab -->
        <section id="tab-tracking" class="tab-content">
            <div id="status-tracker-container"></div>
        </section>

        <!-- Compliance Admin Tab -->
        <section id="tab-admin" class="tab-content">
            <div id="aml-dashboard-container"></div>
        </section>
    </main>

    <!-- Modal Container -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card" id="modal-content"></div>
    </div>

    <!-- Scripts (ES Modules) -->
    <script type="module" src="src/app.js"></script>
</body>
</html>
